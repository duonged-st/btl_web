<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không Gian Học Tập - Nhóm 15</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="workspace-body">

    <header class="main-header workspace-header">
        <div class="header-container">
            <div class="brand-logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">IT</div>
                <h1 class="brand-name font-medium text-sm">Học tập / <span id="workspace-course-title" class="text-muted">Khóa học</span></h1>
            </div>
            <div class="workspace-header-actions">
                <a href="index.html" class="button">Quay lại trang chủ</a>
                <nav class="user-navigation workspace-user-navigation">
                    <div id="user-profile" class="user-profile workspace-user-profile">
                        <div id="user-avatar" class="user-avatar">U</div>
                        <div class="user-info-text">
                            <div id="user-name" class="user-name">Học viên</div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <div class="workspace-layout">
        
        <main class="workspace-main-content">
            <div class="video-container" id="video-container">
                <iframe id="main-video-frame" class="main-video-frame" src="" title="Lesson video" allowfullscreen></iframe>
                <div id="video-status-message" class="video-status-message hidden">Bài học này chưa có video.</div>
            </div>
            <div class="video-footer-info">
                <h2 id="current-lesson-title" class="current-lesson-title">Đang tải bài giảng...</h2>
                <p id="current-lesson-meta" class="current-lesson-meta">Bài 0/0</p>
                <div class="lesson-action-bar">
                    <button id="btn-prev-lesson" class="btn-action">Bài trước</button>
                    <button id="btn-mark-completed" class="btn-action btn-completed">Đánh dấu đã học</button>
                    <button id="btn-next-lesson" class="btn-action">Bài tiếp theo</button>
                </div>
            </div>
        </main>

        <aside class="workspace-sidebar">
            <div class="sidebar-header">
                <h3 class="sidebar-title">Danh sách bài học</h3>
                <span id="lesson-progress-count" class="progress-badge">0/0 bài</span>
            </div>
            <nav id="workspace-lesson-list" class="workspace-lesson-list">
                </nav>
        </aside>

    </div>

    <script src="js/api.js"></script>
    <script src="js/auth-status.js"></script>
    <script src="js/workspace.js"></script>
</body>
</html>
