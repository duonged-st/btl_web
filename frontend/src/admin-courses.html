<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khóa Học - Admin</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand-logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">IT</div>
                <h1 class="brand-name">Nhóm 15</h1>
            </div>
            <nav class="main-nav">
                <a href="index.html" class="button">Trang chủ</a>
                <a href="admin-courses.html" class="button" style="color:var(--primary-color);">Admin</a>
            </nav>
            
            <nav class="user-navigation">
                <div id="user-profile" class="user-profile">
                    <div id="user-avatar" class="user-avatar">A</div>
                    <div class="user-info-text">
                        <div id="user-name" class="user-name">Admin</div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="admin-container">
            <div class="admin-header">
                <h2>Quản Lý Khóa Học</h2>
                <button class="btn-add" id="btn-add-course">+ Thêm Khóa Học</button>
            </div>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Hình Ảnh</th>
                        <th>Tên Khóa Học</th>
                        <th>Giá (VND)</th>
                        <th>Hành Động</th>
                    </tr>
                </thead>
                <tbody id="course-table-body">
                    <!-- Dữ liệu sẽ được render vào đây -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Thêm/Sửa Khóa Học -->
    <div class="modal" id="course-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="course-modal-title">Thêm Khóa Học Mới</h3>
                <button class="close-btn" onclick="closeCourseModal()">&times;</button>
            </div>
            <form id="course-form">
                <input type="hidden" id="course-id">
                <div class="form-group">
                    <label for="course-title">Tên Khóa Học</label>
                    <input type="text" id="course-title" required>
                </div>
                <div class="form-group">
                    <label for="course-description">Mô Tả</label>
                    <textarea id="course-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="course-price">Giá (VND) - Nhập 0 nếu miễn phí</label>
                    <input type="number" id="course-price" value="0" required>
                </div>
                <div class="form-group">
                    <label for="course-thumbnail">Chọn Hình Ảnh (từ thư mục images)</label>
                    <div style="display: flex; gap: 10px; align-items: flex-start;">
                        <select id="course-thumbnail" style="flex: 1; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--background-color);">
                            <option value="">-- Không chọn ảnh --</option>
                        </select>
                        <img id="course-thumbnail-preview" src="" alt="Preview" style="display: none; width: 60px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border-color);">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeCourseModal()">Hủy</button>
                    <button type="submit" class="btn-submit">Lưu Khóa Học</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Quản Lý Bài Học (Lessons) -->
    <div class="modal" id="lesson-modal">
        <div class="modal-content" style="width: 600px;">
            <div class="modal-header">
                <h3 id="lesson-modal-title">Quản Lý Bài Học</h3>
                <button class="close-btn" onclick="closeLessonModal()">&times;</button>
            </div>
            <div style="margin-bottom: 20px;">
                <h4 style="margin-bottom: 10px;">Thêm Video/Bài Học Mới</h4>
                <form id="lesson-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="hidden" id="lesson-course-id">
                    <input type="text" id="lesson-title" placeholder="Tên bài học" required style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    <input type="url" id="lesson-video-url" placeholder="URL Video (Youtube...)" required style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    <input type="number" id="lesson-order" placeholder="Thứ tự" value="1" style="width: 80px; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    <button type="submit" class="btn-add">Thêm</button>
                </form>
            </div>
            <div>
                <h4>Danh Sách Bài Học</h4>
                <ul class="lesson-list" id="lesson-list-container">
                </ul>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth-status.js"></script>
    <script src="js/admin-courses.js"></script>
</body>
</html>
