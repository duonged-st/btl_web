<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Khóa Học IT - Danh Mục</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand-logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">IT</div>
                <h1 class="brand-name">Nhóm 15</h1>
                <a href="index.html" class="button">Trang chủ</a>
                <a href="course-detail.html" class="button">Khóa học</a>
                <a href="learning.html" class="button">Học tập</a>
                <a href="checkout.html" class="button">Thanh toán</a>
                <a href="admin-courses.html" class="button">Admin</a>
            </div>
            
            <nav class="user-navigation">
                <div id="user-profile" class="user-profile">
                    <div id="user-avatar" class="user-avatar">U</div>
                    <div class="user-info-text">
                        <div id="user-name" class="user-name">Học viên</div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        
        <div class="page-header">
            <h2 class="page-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="title-icon"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Khoá học Lập trình chuyên sâu
            </h2>
            <p class="page-subtitle">Nâng cao kỹ năng lập trình đỉnh cao với lộ trình bài bản thực tế.</p>
        </div>

        <div class="filter-bar">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </span>
                <input
                    type="text"
                    id="search-input"
                    class="search-input"
                    placeholder="Tìm kiếm khóa học theo tên hoặc từ khóa..."
                />
            </div>
            <select id="filter-price" class="price-select">
                <option value="all">Tất cả mức giá</option>
                <option value="free">Khóa học miễn phí</option>
                <option value="paid">Khóa học trả phí</option>
            </select>
        </div>

        <div id="loading-state" class="loading-state hidden">
            <svg class="spinner-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="spinner-bg" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="spinner-lever" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="loading-text">Đang tải danh sách khóa học...</p>
        </div>

        <div id="course-grid" class="course-grid">
            </div>

        <div id="empty-state" class="empty-state hidden">
            <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <h3 class="empty-title">Không tìm thấy khóa học nào</h3>
            <p class="empty-subtitle">Thử thay đổi từ khóa tìm kiếm hoặc bộ lọc giá tiền.</p>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script src="js/auth-status.js"></script>
    <script src="js/catalog.js"></script>
</body>
</html>
